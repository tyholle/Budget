<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Budget Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg2: #f5f4f0;
    --bg3: #eeede8;
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9b9b96;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 10px;
    --radius-lg: 14px;
    --green: #0F6E56; --green-bg: #E1F5EE;
    --amber: #854F0B; --amber-bg: #FAEEDA;
    --red: #A32D2D; --red-bg: #FCEBEB;
    --blue: #185FA5; --blue-bg: #E6F1FB;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --text: #f0efea; --text2: #9b9b96; --text3: #6b6b67;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --green: #5DCAA5; --green-bg: #0a2e23;
      --amber: #EF9F27; --amber-bg: #2a1e08;
      --red: #F09595; --red-bg: #2e1111;
      --blue: #85B7EB; --blue-bg: #071e35;
    }
  }
  body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { max-width: 640px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }
  .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; gap: 0; }
  .tab { padding: 10px 18px; font-size: 14px; cursor: pointer; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; transition: color .15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .section { display: none; } .section.active { display: block; }

/* Metrics */
.metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.metric { background: var(–bg2); border-radius: var(–radius); padding: .875rem 1rem; }
.metric-label { font-size: 11px; color: var(–text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.metric-val { font-size: 22px; font-weight: 600; }
.c-ok { color: var(–green); } .c-warn { color: var(–amber); } .c-bad { color: var(–red); } .c-neutral { color: var(–text); }

/* Week nav */
.week-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.week-nav-btns { display: flex; gap: 8px; }
.nav-btn { background: none; border: 1px solid var(–border2); border-radius: var(–radius); padding: 6px 14px; cursor: pointer; font-size: 13px; color: var(–text); font-family: inherit; }
.nav-btn:hover { background: var(–bg2); }
.week-title { font-size: 15px; font-weight: 500; }
.week-sub { font-size: 12px; color: var(–text2); margin-top: 2px; }

/* Add transaction */
.add-form { display: grid; grid-template-columns: 1fr 80px 1fr auto; gap: 8px; margin-bottom: 1.25rem; align-items: end; }
.add-form input, .add-form select {
padding: 9px 10px; font-size: 14px; border: 1px solid var(–border2);
border-radius: var(–radius); background: var(–bg2); color: var(–text);
font-family: inherit; width: 100%;
}
.add-form input:focus, .add-form select:focus { outline: none; border-color: var(–blue); }
.add-btn { padding: 9px 16px; font-size: 14px; font-weight: 500; border: none; border-radius: var(–radius); background: var(–text); color: var(–bg); cursor: pointer; font-family: inherit; white-space: nowrap; }
.add-btn:hover { opacity: .85; }

/* Category cards */
.cat-cards { display: flex; flex-direction: column; gap: 8px; }
.cat-card { background: var(–bg); border: 1px solid var(–border); border-radius: var(–radius-lg); padding: 1rem 1.25rem; }
.cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.cat-name { font-size: 14px; font-weight: 500; }
.cat-amounts { font-size: 13px; color: var(–text2); }
.cat-amounts strong { color: var(–text); font-weight: 500; }
.progress { height: 5px; background: var(–bg3); border-radius: 3px; overflow: hidden; margin-bottom: 0; }
.progress-fill { height: 100%; border-radius: 3px; transition: width .4s; }
.tx-rows { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
.tx-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(–text2); padding: 2px 0; }
.tx-row-right { display: flex; align-items: center; gap: 6px; }
.del-btn { background: none; border: none; color: var(–text3); cursor: pointer; font-size: 15px; line-height: 1; padding: 0; }
.del-btn:hover { color: var(–red); }

/* Bills */
.bills-section-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: var(–text2); margin: 1.25rem 0 .75rem; }
.bill-list { display: flex; flex-direction: column; gap: 8px; }
.bill-item { display: flex; justify-content: space-between; align-items: center; padding: .875rem 1.25rem; background: var(–bg); border: 1px solid var(–border); border-radius: var(–radius); }
.bill-name { font-size: 14px; font-weight: 500; }
.bill-note { font-size: 12px; color: var(–text2); margin-top: 2px; }
.bill-right { display: flex; align-items: center; gap: 10px; }
.bill-amt { font-size: 14px; font-weight: 500; }
.badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; }
.badge-due { background: var(–red-bg); color: var(–red); }
.badge-soon { background: var(–amber-bg); color: var(–amber); }
.badge-ok { background: var(–green-bg); color: var(–green); }

/* Month view */
.month-stat-row { display: flex; justify-content: space-between; align-items: center; padding: .875rem 1.25rem; background: var(–bg2); border-radius: var(–radius); margin-bottom: 8px; }
.month-stat-label { font-size: 13px; color: var(–text2); }
.month-stat-val { font-size: 15px; font-weight: 500; }
.cat-month-row { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; border-bottom: 1px solid var(–border); }
.cat-month-label { color: var(–text2); }
.cat-month-val strong { font-weight: 500; }

/* Travel log */
.trip-form { background: var(–bg2); border-radius: var(–radius-lg); padding: 1.25rem; margin-bottom: 1.25rem; }
.trip-form h3 { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.form-full { margin-bottom: 8px; }
.trip-form input, .trip-form select, .trip-form textarea {
width: 100%; padding: 9px 10px; font-size: 14px; border: 1px solid var(–border2);
border-radius: var(–radius); background: var(–bg); color: var(–text); font-family: inherit;
}
.trip-form textarea { resize: vertical; min-height: 70px; }
.trip-form input:focus, .trip-form textarea:focus { outline: none; border-color: var(–blue); }
.trip-submit { width: 100%; padding: 10px; font-size: 14px; font-weight: 500; border: none; border-radius: var(–radius); background: var(–text); color: var(–bg); cursor: pointer; font-family: inherit; }
.trip-submit:hover { opacity: .85; }
.trip-list { display: flex; flex-direction: column; gap: 12px; }
.trip-card { background: var(–bg); border: 1px solid var(–border); border-radius: var(–radius-lg); overflow: hidden; }
.trip-card-header { padding: 1rem 1.25rem; display: flex; justify-content: space-between; align-items: flex-start; }
.trip-dest { font-size: 16px; font-weight: 600; }
.trip-dates { font-size: 12px; color: var(–text2); margin-top: 3px; }
.trip-cost-badge { background: var(–blue-bg); color: var(–blue); font-size: 13px; font-weight: 500; padding: 4px 12px; border-radius: 20px; }
.trip-card-body { padding: 0 1.25rem 1rem; border-top: 1px solid var(–border); padding-top: .875rem; }
.trip-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; color: var(–text2); margin-bottom: 8px; }
.trip-meta-item strong { display: block; font-size: 13px; font-weight: 500; color: var(–text); margin-bottom: 1px; }
.trip-notes { font-size: 13px; color: var(–text2); line-height: 1.5; }
.trip-del-btn { background: none; border: 1px solid var(–border); border-radius: var(–radius); padding: 5px 12px; font-size: 12px; color: var(–text2); cursor: pointer; font-family: inherit; margin-top: 10px; }
.trip-del-btn:hover { color: var(–red); border-color: var(–red); }
.empty { text-align: center; padding: 2.5rem; color: var(–text2); font-size: 14px; }
.month-week-row { display: flex; justify-content: space-between; font-size: 13px; padding: 7px 0; border-bottom: 1px solid var(–border); }
</style>

</head>
<body>
<div class="container">
  <h1>Budget Tracker</h1>
  <p class="subtitle" id="today-sub"></p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('week')">This week</button>
    <button class="tab" onclick="switchTab('bills')">Monthly bills</button>
    <button class="tab" onclick="switchTab('month')">Month view</button>
    <button class="tab" onclick="switchTab('travel')">Travel log</button>
  </div>

  <!-- WEEK TAB -->

  <div id="tab-week" class="section active">
    <div class="week-nav">
      <div>
        <div class="week-title" id="week-label"></div>
        <div class="week-sub" id="week-sub"></div>
      </div>
      <div class="week-nav-btns">
        <button class="nav-btn" onclick="changeWeek(-1)">&#8592; Prev</button>
        <button class="nav-btn" onclick="goToday()">Today</button>
        <button class="nav-btn" onclick="changeWeek(1)">Next &#8594;</button>
      </div>
    </div>
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">Spent</div><div class="metric-val c-bad" id="w-spent">$0</div></div>
      <div class="metric"><div class="metric-label">Budget</div><div class="metric-val c-neutral" id="w-budget">$420</div></div>
      <div class="metric"><div class="metric-label">Left</div><div class="metric-val c-ok" id="w-left">$420</div></div>
    </div>
    <div class="add-form">
      <input type="text" id="tx-desc" placeholder="Description" />
      <input type="number" id="tx-amt" placeholder="$0" min="0" step="0.01" />
      <select id="tx-cat">
        <option value="Groceries">Groceries</option>
        <option value="Going Out">Going Out</option>
        <option value="Uber/Travel">Uber/Travel</option>
        <option value="Miscellaneous">Miscellaneous</option>
        <option value="Entertainment">Entertainment</option>
      </select>
      <button class="add-btn" onclick="addTx()">+ Add</button>
    </div>
    <div class="cat-cards" id="cat-cards"></div>
  </div>

  <!-- BILLS TAB -->

  <div id="tab-bills" class="section">
    <div id="bills-container"></div>
  </div>

  <!-- MONTH TAB -->

  <div id="tab-month" class="section">
    <div id="month-container"></div>
  </div>

  <!-- TRAVEL TAB -->

  <div id="tab-travel" class="section">
    <div class="trip-form">
      <h3>Log a trip</h3>
      <div class="form-row">
        <input type="text" id="trip-dest" placeholder="Destination (e.g. Austin, TX)" />
        <input type="number" id="trip-cost" placeholder="Total cost ($)" min="0" step="1" />
      </div>
      <div class="form-row">
        <input type="date" id="trip-start" />
        <input type="date" id="trip-end" />
      </div>
      <div class="form-row">
        <input type="text" id="trip-flight" placeholder="Flight cost ($)" />
        <input type="text" id="trip-hotel" placeholder="Hotel/stay cost ($)" />
      </div>
      <div class="form-full">
        <textarea id="trip-notes" placeholder="Notes, highlights, memories..."></textarea>
      </div>
      <button class="trip-submit" onclick="addTrip()">Log trip</button>
    </div>
    <div class="trip-list" id="trip-list"></div>
  </div>
</div>

<script>
// ── Data ───────────────────────────────────────────────
const CATS = [
  { name:'Groceries',    budget:100, color:'#1D9E75' },
  { name:'Going Out',    budget:150, color:'#378ADD' },
  { name:'Uber/Travel',  budget:40,  color:'#7F77DD' },
  { name:'Miscellaneous',budget:30,  color:'#D4537E' },
  { name:'Entertainment',budget:100, color:'#BA7517' },
];
const WEEK_BUDGET = 420;

const BILLS = [
  { name:'Rent',        amount:2500,   day:31, note:'Last day of month' },
  { name:'Gym',         amount:224.15, day:1,  note:'1st of month' },
  { name:'Electric',    amount:175,    day:10, note:'Around 10th (~$175)' },
  { name:'Wifi',        amount:22.50,  day:20, note:'20th of month' },
  { name:'Amazon',      amount:17.00,  day:23, note:'Around 23rd' },
  { name:'Claude Sub',  amount:21.78,  day:27, note:'27th of month' },
];
// Haircut every 3 weeks. Last: Mar 20, 2026 (Thursday)
const HAIRCUT_BASE = new Date(2026, 2, 20); // Mar 20 2026
const HAIRCUT_AMT = 54.35;

// ── Storage ────────────────────────────────────────────
function load(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e) { return def; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

let txData   = load('bgt_tx', {});    // { 'YYYY-MM-DD' (week sun): [{id,desc,amt,cat}] }
let tripData = load('bgt_trips', []); // [{id,dest,cost,start,end,flight,hotel,notes}]

// ── Helpers ────────────────────────────────────────────
function weekStart(d) {
  const dt = new Date(d); dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate() - dt.getDay()); // Sunday
  return dt;
}
function wKey(d) { return d.toISOString().slice(0,10); }
function fmt(n) { return '$' + (Math.round(n * 100)/100).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtDate(d) { return d.toLocaleDateString('en-US', {month:'short', day:'numeric'}); }
function fmtDateLong(d) { return d.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'}); }

const today = new Date(); today.setHours(0,0,0,0);
let currentWS = weekStart(today);

document.getElementById('today-sub').textContent =
  today.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});

// ── Tab switching ──────────────────────────────────────
function switchTab(t) {
  const names = ['week','bills','month','travel'];
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', names[i]===t));
  document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='week')   renderWeek();
  if(t==='bills')  renderBills();
  if(t==='month')  renderMonth();
  if(t==='travel') renderTravel();
}

// ── Week tab ───────────────────────────────────────────
function changeWeek(dir) {
  currentWS = new Date(currentWS);
  currentWS.setDate(currentWS.getDate() + dir*7);
  renderWeek();
}
function goToday() { currentWS = weekStart(today); renderWeek(); }

function renderWeek() {
  const ws = currentWS;
  const we = new Date(ws); we.setDate(we.getDate()+6);
  const isNow = wKey(ws) === wKey(weekStart(today));
  document.getElementById('week-label').textContent = fmtDate(ws) + ' – ' + fmtDate(we);
  document.getElementById('week-sub').textContent = isNow ? 'Current week' : '';

  const txs = txData[wKey(ws)] || [];
  const totalSpent = txs.reduce((s,t) => s+t.amt, 0);
  const left = WEEK_BUDGET - totalSpent;

  document.getElementById('w-spent').textContent = fmt(totalSpent);
  document.getElementById('w-left').textContent = fmt(Math.abs(left));
  document.getElementById('w-left').className = 'metric-val ' + (left >= 0 ? 'c-ok' : left >= -50 ? 'c-warn' : 'c-bad');

  document.getElementById('cat-cards').innerHTML = CATS.map(cat => {
    const catTxs = txs.filter(t => t.cat === cat.name);
    const spent = catTxs.reduce((s,t) => s+t.amt, 0);
    const pct = Math.min(100, Math.round(spent/cat.budget*100));
    const over = spent > cat.budget;
    const txRows = catTxs.map(t => `
      <div class="tx-row">
        <span>${escHtml(t.desc)}</span>
        <div class="tx-row-right">
          <span>${fmt(t.amt)}</span>
          <button class="del-btn" onclick="delTx('${wKey(ws)}','${t.id}')">×</button>
        </div>
      </div>`).join('');
    return `<div class="cat-card">
      <div class="cat-header">
        <span class="cat-name">${cat.name}</span>
        <span class="cat-amounts"><strong>${fmt(spent)}</strong> / ${fmt(cat.budget)}</span>
      </div>
      <div class="progress"><div class="progress-fill" style="width:${pct}%;background:${over?'#E24B4A':cat.color}"></div></div>
      ${catTxs.length ? `<div class="tx-rows">${txRows}</div>` : ''}
    </div>`;
  }).join('');
}

function addTx() {
  const desc = document.getElementById('tx-desc').value.trim();
  const amt  = parseFloat(document.getElementById('tx-amt').value);
  const cat  = document.getElementById('tx-cat').value;
  if(!desc || !amt || amt <= 0) return;
  const k = wKey(currentWS);
  if(!txData[k]) txData[k] = [];
  txData[k].push({ id: Date.now().toString(), desc, amt, cat });
  save('bgt_tx', txData);
  document.getElementById('tx-desc').value = '';
  document.getElementById('tx-amt').value  = '';
  renderWeek();
}

function delTx(k, id) {
  if(!txData[k]) return;
  txData[k] = txData[k].filter(t => t.id !== id);
  save('bgt_tx', txData);
  renderWeek();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Bills tab ──────────────────────────────────────────
function getHaircutDates() {
  const dates = [];
  let d = new Date(HAIRCUT_BASE);
  // find all future dates
  while(d <= today) d = new Date(d.setDate(d.getDate()+21));
  for(let i=0;i<6;i++) { dates.push(new Date(d)); d = new Date(d); d.setDate(d.getDate()+21); }
  return dates;
}

function daysUntilDom(day) {
  const target = new Date(today.getFullYear(), today.getMonth(), day);
  if(target < today) target.setMonth(target.getMonth()+1);
  return Math.round((target - today)/(1000*60*60*24));
}

function badgeHtml(days) {
  if(days <= 2)  return `<span class="badge badge-due">Due in ${days}d</span>`;
  if(days <= 7)  return `<span class="badge badge-soon">${days}d away</span>`;
  return `<span class="badge badge-ok">${days}d away</span>`;
}

function renderBills() {
  const billsHtml = BILLS.map(b => {
    const days = daysUntilDom(b.day);
    return `<div class="bill-item">
      <div><div class="bill-name">${b.name}</div><div class="bill-note">${b.note}</div></div>
      <div class="bill-right">${badgeHtml(days)}<span class="bill-amt">${fmt(b.amount)}</span></div>
    </div>`;
  }).join('');

  const hDates = getHaircutDates();
  const hNext  = hDates[0];
  const hDays  = Math.round((hNext - today)/(1000*60*60*24));
  const hFuture = hDates.slice(1,4).map(d=>fmtDate(d)).join(' · ');
  const haircutHtml = `<div class="bill-item">
    <div>
      <div class="bill-name">Haircut</div>
      <div class="bill-note">Every 3 weeks · Next: ${fmtDate(hNext)} · Then: ${hFuture}</div>
    </div>
    <div class="bill-right">${badgeHtml(hDays)}<span class="bill-amt">${fmt(HAIRCUT_AMT)}</span></div>
  </div>`;

  const fixedTotal = BILLS.reduce((s,b)=>s+b.amount,0) + HAIRCUT_AMT;
  document.getElementById('bills-container').innerHTML = `
    <div class="bills-section-title">Recurring bills</div>
    <div class="bill-list">${billsHtml}${haircutHtml}</div>
    <div style="margin-top:1rem;padding:.875rem 1.25rem;background:var(--bg2);border-radius:var(--radius);display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;color:var(--text2)">Fixed monthly total</span>
      <span style="font-size:16px;font-weight:600">${fmt(fixedTotal)}</span>
    </div>`;
}

// ── Month tab ──────────────────────────────────────────
function renderMonth() {
  const now = today;
  // Weeks that START in this month
  const year = now.getFullYear(), month = now.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month+1, 0);

  // Enumerate all Sundays that fall within this month
  const weeks = [];
  let d = weekStart(firstDay);
  // if that Sunday is before the 1st, step forward if needed
  while(d.getMonth() !== month && d < firstDay) d.setDate(d.getDate()+7);
  // collect all week-starts whose Sunday is in this month
  let probe = new Date(year, month, 1);
  // find first sunday in month
  let sun = new Date(year, month, 1);
  sun.setDate(sun.getDate() - sun.getDay());
  if(sun.getMonth() < month) sun.setDate(sun.getDate()+7);
  while(sun.getMonth() === month) {
    weeks.push(new Date(sun));
    sun.setDate(sun.getDate()+7);
  }

  const monthName = now.toLocaleDateString('en-US',{month:'long',year:'numeric'});

  let totalTracked = 0;
  const catTotals = {};
  CATS.forEach(c=>catTotals[c.name]=0);

  const weekRows = weeks.map(ws => {
    const we = new Date(ws); we.setDate(we.getDate()+6);
    const txs = txData[wKey(ws)] || [];
    const spent = txs.reduce((s,t)=>s+t.amt,0);
    totalTracked += spent;
    txs.forEach(t => { catTotals[t.cat] = (catTotals[t.cat]||0) + t.amt; });
    const left = WEEK_BUDGET - spent;
    const leftColor = left>=0?'var(--green)':left>=-50?'var(--amber)':'var(--red)';
    const isNow = wKey(ws)===wKey(weekStart(today));
    return `<div class="month-week-row">
      <span style="color:var(--text2)">${fmtDate(ws)}–${fmtDate(we)}${isNow?' <span style="font-size:11px;background:var(--blue-bg);color:var(--blue);padding:1px 6px;border-radius:8px;margin-left:4px">now</span>':''}</span>
      <span><strong>${fmt(spent)}</strong> <span style="color:${leftColor};font-size:12px">${left>=0?'('+fmt(left)+' left)':'('+fmt(Math.abs(left))+' over)'}</span></span>
    </div>`;
  }).join('');

  const fixedTotal = BILLS.reduce((s,b)=>s+b.amount,0) + HAIRCUT_AMT;
  const weekBudgetTotal = weeks.length * WEEK_BUDGET;
  const grandEst = fixedTotal + weekBudgetTotal;

  // Travel spend: trips whose start date falls in this month
  const travelSpend = tripData.reduce((s,t) => {
    if(!t.start) return s;
    const d = new Date(t.start+'T12:00:00');
    if(d.getFullYear()===year && d.getMonth()===month) return s+(t.cost||0);
    return s;
  }, 0);

  const travelTrips = tripData.filter(t => {
    if(!t.start) return false;
    const d = new Date(t.start+'T12:00:00');
    return d.getFullYear()===year && d.getMonth()===month;
  });

  const travelRows = travelTrips.map(t => `
    <div class="cat-month-row">
      <span class="cat-month-label" style="padding-left:12px">↳ ${escHtml(t.dest)}</span>
      <span class="cat-month-val"><strong>${fmt(t.cost||0)}</strong></span>
    </div>`).join('');

  const catRows = CATS.map(c => `
    <div class="cat-month-row">
      <span class="cat-month-label">${c.name}</span>
      <span class="cat-month-val"><strong>${fmt(catTotals[c.name]||0)}</strong> <span style="color:var(--text3)">/ ${fmt(c.budget*weeks.length)} (${weeks.length}wk)</span></span>
    </div>`).join('');

  const travelLine = `
    <div class="cat-month-row">
      <span class="cat-month-label" style="color:var(--blue)">Travel (no budget)</span>
      <span class="cat-month-val"><strong style="color:var(--blue)">${fmt(travelSpend)}</strong> <span style="color:var(--text3)">${travelTrips.length} trip${travelTrips.length!==1?'s':''}</span></span>
    </div>
    ${travelRows}`;

  document.getElementById('month-container').innerHTML = `
    <div style="font-size:16px;font-weight:600;margin-bottom:1rem">${monthName}</div>
    <div class="month-stat-row"><span class="month-stat-label">Fixed bills (est.)</span><span class="month-stat-val">${fmt(fixedTotal)}</span></div>
    <div class="month-stat-row"><span class="month-stat-label">Weekly budget (${weeks.length} weeks)</span><span class="month-stat-val">${fmt(weekBudgetTotal)}</span></div>
    <div class="month-stat-row" style="margin-bottom:1.5rem"><span class="month-stat-label" style="font-weight:500">Total estimate</span><span class="month-stat-val" style="font-size:18px">${fmt(grandEst)}</span></div>

    <div class="bills-section-title">Weeks in ${monthName.split(' ')[0]}</div>
    ${weekRows}

    <div class="bills-section-title" style="margin-top:1.25rem">Tracked by category</div>
    ${catRows}
    ${travelLine}
    <div class="month-week-row" style="border-bottom:none;margin-top:4px">
      <span style="font-weight:500">Total tracked (excl. travel)</span>
      <span style="font-weight:600">${fmt(totalTracked)}</span>
    </div>
    <div class="month-week-row" style="border-bottom:none;margin-top:2px">
      <span style="font-weight:500;color:var(--text2)">Total incl. travel</span>
      <span style="font-weight:600;color:var(--text2)">${fmt(totalTracked + travelSpend)}</span>
    </div>`;
}

// ── Travel log ─────────────────────────────────────────
function addTrip() {
  const dest   = document.getElementById('trip-dest').value.trim();
  const cost   = parseFloat(document.getElementById('trip-cost').value)||0;
  const start  = document.getElementById('trip-start').value;
  const end    = document.getElementById('trip-end').value;
  const flight = document.getElementById('trip-flight').value.trim();
  const hotel  = document.getElementById('trip-hotel').value.trim();
  const notes  = document.getElementById('trip-notes').value.trim();
  if(!dest) return;
  tripData.unshift({ id:Date.now().toString(), dest, cost, start, end, flight, hotel, notes });
  save('bgt_trips', tripData);
  ['trip-dest','trip-cost','trip-start','trip-end','trip-flight','trip-hotel','trip-notes'].forEach(id=>{document.getElementById(id).value='';});
  renderTravel();
}

function delTrip(id) {
  if(!confirm('Remove this trip?')) return;
  tripData = tripData.filter(t=>t.id!==id);
  save('bgt_trips', tripData);
  renderTravel();
}

function renderTravel() {
  const total = tripData.reduce((s,t)=>s+(t.cost||0),0);
  if(!tripData.length) {
    document.getElementById('trip-list').innerHTML = '<div class="empty">No trips logged yet — add your first one above.</div>';
    return;
  }
  document.getElementById('trip-list').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <span style="font-size:13px;color:var(--text2)">${tripData.length} trip${tripData.length!==1?'s':''}</span>
      <span style="font-size:14px;font-weight:500">Total spent: ${fmt(total)}</span>
    </div>` +
    tripData.map(t => {
      const dateRange = t.start && t.end ? fmtDate(new Date(t.start+'T12:00:00'))+' – '+fmtDate(new Date(t.end+'T12:00:00'))
                      : t.start ? fmtDate(new Date(t.start+'T12:00:00')) : '';
      return `<div class="trip-card">
        <div class="trip-card-header">
          <div>
            <div class="trip-dest">${escHtml(t.dest)}</div>
            ${dateRange?`<div class="trip-dates">${dateRange}</div>`:''}
          </div>
          ${t.cost?`<span class="trip-cost-badge">${fmt(t.cost)}</span>`:''}
        </div>
        <div class="trip-card-body">
          <div class="trip-meta-grid">
            ${t.flight?`<div class="trip-meta-item"><strong>Flight</strong>$${t.flight}</div>`:''}
            ${t.hotel?`<div class="trip-meta-item"><strong>Hotel/Stay</strong>$${t.hotel}</div>`:''}
          </div>
          ${t.notes?`<div class="trip-notes">${escHtml(t.notes)}</div>`:''}
          <button class="trip-del-btn" onclick="delTrip('${t.id}')">Remove trip</button>
        </div>
      </div>`;
    }).join('');
}

// ── Init ───────────────────────────────────────────────
renderWeek();
</script>
